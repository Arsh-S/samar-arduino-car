<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Samar Car</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="overlay"></canvas>

    <!-- Top status cluster -->
    <header id="topbar">
      <span id="bleStatus" class="pill status bad">BLE: disconnected</span>
      <span id="modelStatus" class="pill status bad">Model: loading</span>
      <span id="fps" class="pill mono">0 fps</span>
    </header>

    <!-- Bottom HUD -->
    <section id="hud">
      <!-- Steer readout: the visual centerpiece -->
      <div class="steer-card">
        <div class="steer-head">
          <span class="steer-label">STEER</span>
          <span id="cmd" class="steer-value mono">128</span>
        </div>
        <div class="steer-track" aria-hidden="true">
          <div class="steer-center"></div>
          <div id="steerBar" class="steer-fill"></div>
          <div id="steerMarker" class="steer-marker"></div>
        </div>
        <div class="steer-axis mono">
          <span>L&nbsp;0</span>
          <span>128</span>
          <span>255&nbsp;R</span>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <label class="field">
          <span class="field-label">Target</span>
          <select id="targetClass"></select>
        </label>
        <label class="field">
          <span class="field-label">Min conf</span>
          <span class="slider-wrap">
            <input id="minConf" type="range" min="0.2" max="0.9" step="0.05" value="0.5" />
            <span id="minConfVal" class="mono">0.50</span>
          </span>
        </label>
      </div>

      <div class="actions">
        <button id="connectBtn" class="btn btn-secondary">Connect car</button>
        <button id="autoBtn" class="btn btn-primary" disabled>Autopilot: OFF</button>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
